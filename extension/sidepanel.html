<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Anything with AI</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- VIEW 1: Home Dashboard -->
  <div id="homeView">
    <!-- Header -->
    <header class="header">
      <h1>Learn Anything</h1>
      <p class="tagline">Your AI-powered learning companion</p>
    </header>

    <!-- 3 Steps Section -->
    <section class="steps-section">
      <h2>3 Steps to Learn Anything</h2>
      <div class="steps">
        <div class="step">
          <span class="step-number">1</span>
          <span class="step-text">Paste your goal</span>
        </div>
        <div class="step">
          <span class="step-number">2</span>
          <span class="step-text">Follow the AI steps</span>
        </div>
        <div class="step">
          <span class="step-number">3</span>
          <span class="step-text">If stuck, ask "How else could we solve this?"</span>
        </div>
      </div>
    </section>

    <!-- Top Things to Learn -->
    <section class="ideas-section">
      <h2>Top Things to Learn</h2>
      <div class="ideas-grid">
        <button class="idea-card" data-prompt="Help me use Loveable to build a website from scratch. Walk me through it step by step.">
          <span class="idea-icon">🌐</span>
          <span class="idea-label">Build a Website with Loveable</span>
        </button>
        <button class="idea-card" data-prompt="Help me build a Chrome extension step by step. Start with what it should do and guide me through the code.">
          <span class="idea-icon">🧩</span>
          <span class="idea-label">Build a Chrome Extension</span>
        </button>
        <button class="idea-card" data-prompt="Help me build a full software application using Loveable. Guide me through planning, designing, and building it.">
          <span class="idea-icon">🚀</span>
          <span class="idea-label">Build Software with Loveable</span>
        </button>
        <button class="idea-card" data-prompt="Help me write a book. Start by helping me choose a topic, outline chapters, and write the first chapter.">
          <span class="idea-icon">📖</span>
          <span class="idea-label">Write a Book</span>
        </button>
        <button class="idea-card" data-prompt="Help me create and launch an online course. Guide me through picking a topic, structuring lessons, and recording content.">
          <span class="idea-icon">🎓</span>
          <span class="idea-label">Create an Online Course</span>
        </button>
        <button class="idea-card" data-prompt="Help me start a YouTube channel. Guide me through niche selection, scripting my first video, and setting up the channel.">
          <span class="idea-icon">🎬</span>
          <span class="idea-label">Start a YouTube Channel</span>
        </button>
        <button class="idea-card" data-prompt="Help me build a mobile app from idea to prototype. Walk me through design, development, and testing.">
          <span class="idea-icon">📱</span>
          <span class="idea-label">Build a Mobile App</span>
        </button>
        <button class="idea-card" data-prompt="Help me automate tasks in my daily life and work using AI tools and scripts. Show me practical automations I can set up today.">
          <span class="idea-icon">🤖</span>
          <span class="idea-label">Automate Your Life with AI</span>
        </button>
      </div>
    </section>

    <!-- AI Selector -->
    <section class="ai-controls">
      <div class="ai-selector">
        <label for="aiSelect">Chat with:</label>
        <select id="aiSelect">
          <option value="https://claude.ai" selected>Claude</option>
          <option value="https://chat.openai.com">ChatGPT</option>
          <option value="https://gemini.google.com">Gemini</option>
          <option value="https://copilot.microsoft.com">Copilot</option>
        </select>
      </div>
      <button id="openAiBtn" class="btn btn-primary btn-full">Open AI Chat</button>
    </section>
  </div>

  <!-- VIEW 2: AI Chat (iframe + toolbar) -->
  <div id="chatView" style="display:none;">
    <!-- Chat Toolbar -->
    <div class="chat-toolbar">
      <button id="backBtn" class="toolbar-btn" title="Back to home">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <select id="aiSelectChat" class="toolbar-select">
        <option value="https://claude.ai" selected>Claude</option>
        <option value="https://chat.openai.com">ChatGPT</option>
        <option value="https://gemini.google.com">Gemini</option>
        <option value="https://copilot.microsoft.com">Copilot</option>
      </select>
      <button id="screenshotBtn" class="toolbar-btn btn-screenshot-icon" title="Screenshot & paste to AI">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
      <button id="refreshBtn" class="toolbar-btn" title="Reload chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
    </div>
    <!-- AI iframe -->
    <iframe id="aiFrame" src="" allow="clipboard-read; clipboard-write"></iframe>

    <!-- Screenshot preview overlay -->
    <div id="screenshotOverlay" class="screenshot-overlay" style="display:none;">
      <div class="screenshot-overlay-content">
        <h3>Screenshot Captured</h3>
        <img id="screenshotPreview" alt="Screenshot preview">
        <p class="screenshot-hint">Screenshot copied to clipboard! Paste it into the chat below with Ctrl+V / Cmd+V</p>
        <div class="screenshot-actions">
          <button id="copyAgainBtn" class="btn btn-primary">Copy Again</button>
          <button id="dismissBtn" class="btn btn-secondary">Dismiss</button>
        </div>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
